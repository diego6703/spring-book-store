databaseChangeLog:
  - changeSet:
      id: create-table-roles
      author: diego
      changes:
        - createTable:
            tableName: roles
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: varchar(255), constraints: { nullable: false, unique: true } }

  - changeSet:
      id: create-table-users_roles
      author: diego
      changes:
        - createTable:
            tableName: users_roles
            columns:
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
              - column: { name: role_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: users_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_users_roles_user
        - addForeignKeyConstraint:
            baseTableName: users_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: id
            constraintName: fk_users_roles_role
        - addUniqueConstraint:
            tableName: users_roles
            columnNames: user_id, role_id
            constraintName: uk_users_roles_user_role

